        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

        <title>Patience slider</title>

        <meta name="description" content="Welcome to Bad UI Hub, a diabolical collection of the worst ways to control your volume.">

        <meta property="og:type" content="website">
        <meta property="og:title" content="Bad UI Hub: Patience slider">
        <meta property="og:description" content="Can you survive the torture? Be patient.">
        <meta property="og:image" content="https://baduihub.com/img/BadUIHub.png">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:image" content="https://baduihub.com/img/BadUIHub.png">

        <script>
            let initialConsent = null;

            function onTermlyLoaded() {
                // Ci assicuriamo che l'oggetto Termly sia pronto
                if (window.Termly) {
                    window.Termly.on('consent', function(data) {
                        // Al primo caricamento salviamo lo stato iniziale
                        if (initialConsent === null) {
                            initialConsent = JSON.stringify(data.categories);
                        } else {
                            // Se l'utente cambia le preferenze, ricarichiamo la pagina
                            let newConsent = JSON.stringify(data.categories);
                            if (initialConsent !== newConsent) {
                                window.location.reload();
                            }
                        }
                    });
                }
            }
        </script>
        
        <script src="https://app.termly.io/resource-blocker/48f43e02-cb14-4933-988b-b64dc3489783?autoBlock=on" onload="onTermlyLoaded()"></script>

        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-BQ5KP12WZ7"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());

            gtag('config', 'G-BQ5KP12WZ7');
        </script>
        <!-- End Google tag (gtag.js) -->

        <link rel="stylesheet" href="../../../slider.css">
        <link rel="stylesheet" href="Patience.css">
        <script src="Patience.js"></script>
    </head>
    <body>
        <a href="../index.html" class="nav-home">🏠</a>
        
        <div id="container">
            <audio id="audio" src="../../../audio/mainmusic.mp3" autoplay loop></audio>
            
            <h2 style="margin-top:0; color:#A1887F;">Be patient, much patient.</h2>
            
            <div id="patience-track">
                <div id="patience-fill"></div>
                <div id="patience-thumb"></div>
            </div>
            
            <p id="value" class="decimal-value">Volume: 0.0000%</p>
            <p style="font-size: 0.8rem; color: #888; max-width: 300px;">
                Swing right. do not go left and do not release the cursor.
            </p>
        </div>
        <footer class="site-footer">
            <div class="footer-links">
                <a href="../../../privacy-policy.html" target="_blank">Privacy Policy</a> 
                <a href="#" class="termly-display-preferences">Consent Preferences</a>
            </div>
        </footer>
    </body>
