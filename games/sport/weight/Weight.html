        <script>
            let initialConsent = null;

            function onTermlyLoaded() {
                // Ci assicuriamo che l'oggetto Termly sia pronto
                if (window.Termly) {
                    window.Termly.on('consent', function(data) {
                        // Al primo caricamento salviamo lo stato iniziale
                        if (initialConsent === null) {
                            initialConsent = JSON.stringify(data.categories);
                        } else {
                            // Se l'utente cambia le preferenze, ricarichiamo la pagina
                            let newConsent = JSON.stringify(data.categories);
                            if (initialConsent !== newConsent) {
                                window.location.reload();
                            }
                        }
                    });
                }
            }
        </script>
        
        <script src="https://app.termly.io/resource-blocker/48f43e02-cb14-4933-988b-b64dc3489783?autoBlock=on" onload="onTermlyLoaded()"></script>

    <body>
        <a href="../index.html" class="nav-home">🏠</a>
        <div id="container">
            <audio id="audio" src="../../../audio/mainmusic.mp3" autoplay loop></audio>
            
            <audio id="mock-sound" src="../../../audio/mocksound.mp3"></audio>

            <div id="game-area">
                <h2>Weightlifting Volume</h2>
                <p class="hint-text">Press <b>SPACE</b> repeatedly to lift the volume. Press <b>ENTER</b> to lock it on the rack. Don't let it fall!</p>
                
                <div class="game-stage" id="mobile-mash-area">
                    <div id="rack-container">
                        <div class="rack-pole left"></div>
                        <div class="rack-pole right"></div>
                        
                        <div id="barbell-wrapper">
                            <div id="barbell">
                                <div class="weight-plate left"></div>
                                <div class="bar"></div>
                                <div class="weight-plate right"></div>
                            </div>
                        </div>
                        
                        <div id="crash-effect" style="display: none;">💥 CRASH!</div>
                    </div>
                </div>
                
                <p class="mobile-hint">On mobile: touch the area of the barbell, then use the button below.</p>
                <button id="lock-btn-mobile" class="btn" style="display:none; margin-bottom:10px;">Lock Volume (ENTER)</button>
                <button id="new-try-btn" class="btn" style="display:none;">Try Again (If You Have Breath)</button>
                
                <p id="current-volume-text">Current volume: 0%</p>
            </div>
            
        </div>
