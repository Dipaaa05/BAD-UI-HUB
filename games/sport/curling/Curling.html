<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

        <link rel="stylesheet" href="Curling.css">

        <a href="../index.html" class="nav-home">🏠</a>
        <div id="container">
            <audio id="audio" src="../../../audio/mainmusic.mp3" autoplay loop></audio>
            <audio id="mock-sound" src="../../../audio/mocksound.mp3"></audio>

            <h2 style="margin-top:0; color:#00BCD4;">Curling!</h2>
            
            <div id="ice-track">
                <div id="target-house"></div>
                <div id="stone"></div>
            </div>
            
            <p id="value">Volume: 0%</p>

            <div id="curling-controls">
                <button id="launch-btn" class="btn">Launch Stone</button>
                <button id="sweep-btn" class="btn" disabled>🧹 Sweep!</button>
            </div>
            
            <input type="range" id="volume" min="0" max="100" value="0" disabled>
        </div>
