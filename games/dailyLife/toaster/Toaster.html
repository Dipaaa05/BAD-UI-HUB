        <script>
            let initialConsent = null;

            function onTermlyLoaded() {
                // Ci assicuriamo che l'oggetto Termly sia pronto
                if (window.Termly) {
                    window.Termly.on('consent', function(data) {
                        // Al primo caricamento salviamo lo stato iniziale
                        if (initialConsent === null) {
                            initialConsent = JSON.stringify(data.categories);
                        } else {
                            // Se l'utente cambia le preferenze, ricarichiamo la pagina
                            let newConsent = JSON.stringify(data.categories);
                            if (initialConsent !== newConsent) {
                                window.location.reload();
                            }
                        }
                    });
                }
            }
        </script>
        
        <script src="https://app.termly.io/resource-blocker/48f43e02-cb14-4933-988b-b64dc3489783?autoBlock=on" onload="onTermlyLoaded()"></script>

    <body>
        <a href="../index.html" class="nav-home">🏠</a>
        
        <div id="container">
            <h2>Toaster Volume Control</h2>
            <p class="subtitle">Hold the lever to toast. Release to set volume.</p>

            <div id="toaster-scene">
                <div id="toaster">
                    <div class="slot">
                        <div id="toast"></div>
                    </div>
                    <div id="lever-track">
                        <div id="lever"></div>
                    </div>
                </div>
                <div id="cooking-timer">0%</div>
                <div id="smoke-container"></div>
            </div>

            <h1 id="value">Volume: 0%</h1>
            <p id="status-msg">Pull the lever to start cooking...</p>

            <audio id="audio" loop src="../../../audio/test-audio.mp3"></audio>
            <audio id="mock-sound" src="../../../audio/mocksound.mp3"></audio>
            
            <p class="hint-text">Be careful! You can't see the progress after a few seconds. Don't burn it!</p>
            <button class="btn" id="retry-btn" style="display: none;">Throw away burnt toast</button>
        </div>
