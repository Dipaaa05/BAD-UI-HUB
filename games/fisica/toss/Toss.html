<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta charset="UTF-8">
        <title>Parabolic Toss</title>
        <script src="https://app.termly.io/resource-blocker/48f43e02-cb14-4933-988b-b64dc3489783?autoBlock=on"></script>
        <link rel="stylesheet" href="../../../slider.css">
        <link rel="stylesheet" href="Toss.css">
        <script src="Toss.js"></script>
    </head>
    <body>
        <a href="../index.html" class="nav-home">🏠</a>
        <div id="container">
            <audio id="audio" src="../../../audio/mainmusic.mp3" autoplay loop></audio>
            <audio id="mock-sound" src="../../../audio/mocksound.mp3"></audio>

            <h2 style="margin-top:0; color:#9C27B0;">Launch!</h2>
            
            <div id="toss-area">
                <div id="projectile"></div>
                <input type="range" id="volume" min="0" max="100" value="0" disabled style="position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); margin: 0;">
            </div>
            
            <p id="value">Volume: 0%</p>

            <div id="power-container">
                <div id="power-fill"></div>
            </div>

            <button id="action-btn" class="btn">Hold and release to launch!</button>
        </div>
        <footer class="site-footer">
            <div class="footer-links">
                <a href="../../../privacy-policy.html" target="_blank">Privacy Policy</a> | 
                <a href="#" class="termly-display-preferences">Consent Preferences</a>
            </div>
        </footer>
    </body>
</html>
