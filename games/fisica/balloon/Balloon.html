        <script>
            let initialConsent = null;

            function onTermlyLoaded() {
                // Ci assicuriamo che l'oggetto Termly sia pronto
                if (window.Termly) {
                    window.Termly.on('consent', function(data) {
                        // Al primo caricamento salviamo lo stato iniziale
                        if (initialConsent === null) {
                            initialConsent = JSON.stringify(data.categories);
                        } else {
                            // Se l'utente cambia le preferenze, ricarichiamo la pagina
                            let newConsent = JSON.stringify(data.categories);
                            if (initialConsent !== newConsent) {
                                window.location.reload();
                            }
                        }
                    });
                }
            }
        </script>
        
        <script src="https://app.termly.io/resource-blocker/48f43e02-cb14-4933-988b-b64dc3489783?autoBlock=on" onload="onTermlyLoaded()"></script>

            <div id="game-area">
                <h2>Balloon Volume</h2>
                <p class="hint-text">Drag the pump handle up and down to inflate the balloon. Press <b>Tie Knot</b> to set the volume. Don't let it pop!</p>
                
                <div class="game-stage">
                    <div id="balloon-container">
                        <div id="balloon"></div>
                        <div id="pop-effect" style="display: none;">💥 BOOM!</div>
                    </div>
                    
                    <div id="pump-container">
                        <div id="pump-track">
                            <div id="pump-rod"></div>
                            <div id="pump-handle"></div>
                        </div>
                        <div id="pump-base"></div>
                    </div>
                </div>
                
                <button id="new-balloon-btn" class="btn" style="display:none;">Get New Balloon</button>
                <button id="tie-knot-btn" class="btn">Tie Knot</button>
                <p id="current-volume-text">Current volume: ?</p>
